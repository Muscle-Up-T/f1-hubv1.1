<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="F1 Hub"/>
<meta name="theme-color" content="#080808"/>
<meta name="format-detection" content="telephone=no,date=no,email=no,address=no"/>
<title>F1 Hub 2026</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-512.png"/>
<meta name="mobile-web-app-capable" content="yes"/>

<link href="https://fonts.googleapis.com/css2?family=Formula1+Display:wght@Regular;Bold;Wide&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,300;0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
a,a:any-link{color:#e10600!important;-webkit-text-fill-color:#e10600!important;text-decoration:none!important;}
[x-apple-data-detectors],[x-apple-data-detectors] *{color:inherit!important;-webkit-text-fill-color:inherit!important;text-decoration:none!important;pointer-events:none!important;}
html,body{height:100%;background:#080808;color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;font-family:'Titillium Web',sans-serif;overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:0;}
input,textarea,select{-webkit-appearance:none;appearance:none;color:#f0f0f0;-webkit-text-fill-color:#f0f0f0;background:#1a1a1a;font-family:'Titillium Web',sans-serif;}
button{-webkit-appearance:none;appearance:none;font-family:'Titillium Web',sans-serif;background:none;border:none;}

/* ── DESIGN TOKENS ─────────────────────────────────────────── */
:root{
  --f1-red:#e10600;
  --f1-red2:#ff1a17;
  --f1-red-dim:rgba(225,6,0,0.12);
  --bg:#080808;
  --card:#111111;
  --card2:#161616;
  --border:#1e1e1e;
  --border2:#2a2a2a;
  --muted:#666;
  --muted2:#888;
  --white:#ffffff;

  --mercedes:#00d2be;
  --ferrari:#dc0000;
  --mclaren:#ff8000;
  --redbull:#3671c6;
  --alpine:#0090ff;
  --williams:#64c4ff;
  --haas:#aaaaaa;
  --audi:#b8b8b8;
  --racingbulls:#5473ff;
  --astonmartin:#00695c;
  --cadillac:#e10600;
}

/* ── ANIMATIONS ─────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes slideRight{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── LAYOUT ─────────────────────────────────────────── */
#app{max-width:430px;margin:0 auto;min-height:100vh;min-height:-webkit-fill-available;background:var(--bg);display:flex;flex-direction:column;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 0 110px;}
.fade{animation:fadeUp .22s ease;}

/* ── HEADER ─────────────────────────────────────────── */
.header{padding:env(safe-area-inset-top,44px) 0 0;background:rgba(8,8,8,.98);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);}
.header-row{display:flex;align-items:center;justify-content:space-between;padding:0 16px 14px;}

/* F1 LOGO */
.f1-logo{display:flex;align-items:center;gap:0;}
.f1-logo-badge{
  background:var(--f1-red);
  color:#fff;-webkit-text-fill-color:#fff;
  font-family:'Titillium Web',sans-serif;
  font-weight:900;font-size:15px;
  letter-spacing:.5px;
  padding:4px 9px 4px 10px;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 50%,calc(100% - 6px) 100%,0 100%);
  line-height:1.1;
}
.f1-logo-text{
  font-family:'Titillium Web',sans-serif;
  font-weight:900;font-size:13px;letter-spacing:3px;
  color:#fff;-webkit-text-fill-color:#fff;
  padding:4px 10px;
  background:#1e1e1e;
  border:1px solid #2a2a2a;
  border-left:none;
  clip-path:polygon(6px 0,100% 0,100% 100%,0 100%);
  padding-left:14px;
  line-height:1.1;
}
.f1-logo-year{
  font-family:'Titillium Web',sans-serif;
  font-weight:300;font-size:13px;letter-spacing:2px;
  color:var(--muted2);-webkit-text-fill-color:var(--muted2);
  padding-left:8px;
}

/* HEADER RIGHT INDICATORS */
.live-pill{display:flex;align-items:center;gap:5px;background:var(--f1-red-dim);border:1px solid rgba(225,6,0,.35);border-radius:4px;padding:4px 10px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--f1-red);animation:pulse 1.1s ease-in-out infinite;}
.live-text{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--f1-red);-webkit-text-fill-color:var(--f1-red);}
.round-pill{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted2);-webkit-text-fill-color:var(--muted2);}

/* ── NEXT RACE WIDGET ─────────────────────────────────────── */
.nrw{
  margin:0 16px 0;
  background:linear-gradient(135deg,#160003 0%,#0d0d0d 55%,#080813 100%);
  border:1px solid rgba(225,6,0,.22);
  border-radius:12px;overflow:hidden;position:relative;
  padding:14px;
}
.nrw::after{
  content:'';position:absolute;top:-30px;right:-30px;
  width:140px;height:140px;
  background:radial-gradient(circle,rgba(225,6,0,.1) 0%,transparent 70%);
  pointer-events:none;
}
/* Red top accent bar */
.nrw-accent{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--f1-red),transparent);}
.nrw-label{font-size:9px;font-weight:700;letter-spacing:2.5px;color:var(--f1-red);-webkit-text-fill-color:var(--f1-red);text-transform:uppercase;margin-bottom:7px;}
.nrw-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.nrw-name{font-family:'Titillium Web',sans-serif;font-weight:900;font-size:19px;letter-spacing:.5px;color:#fff;-webkit-text-fill-color:#fff;line-height:1.1;}
.nrw-circuit{font-size:11px;color:var(--muted2);-webkit-text-fill-color:var(--muted2);font-weight:400;margin-top:3px;}
.nrw-flag{font-size:24px;margin-left:6px;flex-shrink:0;}
/* Countdown */
.nrw-cd{display:flex;align-items:center;gap:2px;margin-bottom:12px;}
.cd-block{text-align:center;background:rgba(255,255,255,.04);border:1px solid #222;border-radius:6px;padding:6px 10px;min-width:48px;}
.cd-num{font-family:'Titillium Web',sans-serif;font-weight:700;font-size:22px;letter-spacing:1px;color:#fff;-webkit-text-fill-color:#fff;line-height:1;}
.cd-unit{font-size:8px;font-weight:700;letter-spacing:1.5px;color:#444;-webkit-text-fill-color:#444;text-transform:uppercase;margin-top:2px;}
.cd-sep{font-family:'Titillium Web',sans-serif;font-size:18px;color:#333;-webkit-text-fill-color:#333;padding:0 3px;align-self:flex-start;padding-top:6px;}
/* Sessions strip */
.nrw-sessions{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;}
.nrw-sess{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:7px 10px;flex-shrink:0;}
.nrw-sess.race-sess{border-color:rgba(225,6,0,.3);background:rgba(225,6,0,.06);}
.nrw-sess.sprint-sess{border-color:rgba(255,128,0,.3);background:rgba(255,128,0,.05);}
.ns-type{font-size:8px;font-weight:700;letter-spacing:1.5px;color:var(--muted);-webkit-text-fill-color:var(--muted);text-transform:uppercase;margin-bottom:3px;}
.ns-date{font-size:12px;font-weight:700;color:#fff;-webkit-text-fill-color:#fff;}
.ns-time{font-size:10px;color:var(--muted2);-webkit-text-fill-color:var(--muted2);}

/* SPRINT / CANCELLED BADGES */
.badge-sprint{display:inline-flex;align-items:center;background:rgba(255,128,0,.12);border:1px solid rgba(255,128,0,.3);border-radius:3px;padding:2px 7px;font-size:9px;font-weight:700;letter-spacing:1.5px;color:#ff8000;-webkit-text-fill-color:#ff8000;margin-left:7px;vertical-align:middle;}
.badge-cancelled{display:inline-flex;align-items:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:3px;padding:2px 7px;font-size:9px;font-weight:700;letter-spacing:1.5px;color:#666;-webkit-text-fill-color:#666;margin-left:7px;vertical-align:middle;text-decoration:line-through;}

/* ── BOTTOM NAV ─────────────────────────────────────────── */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(8,8,8,.98);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;
  padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom,16px));
  z-index:100;
}
.nav-btn{
  background:none!important;border:none!important;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:#444!important;-webkit-text-fill-color:#444!important;
  font-family:'Titillium Web',sans-serif;transition:color .15s;
  min-width:58px;padding:4px 0;-webkit-appearance:none;
  text-decoration:none!important;
}
.nav-btn .nav-label{color:#444!important;-webkit-text-fill-color:#444!important;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.nav-btn.active .nav-label{color:var(--f1-red)!important;-webkit-text-fill-color:var(--f1-red)!important;}
.nav-btn.active .nav-icon-wrap{color:var(--f1-red)!important;-webkit-text-fill-color:var(--f1-red)!important;}
.nav-icon-wrap{font-size:19px;line-height:1;color:#444;-webkit-text-fill-color:#444;}

/* Active tab indicator */
.nav-btn.active::before{content:'';display:block;position:absolute;top:0;width:28px;height:2px;background:var(--f1-red);border-radius:0 0 2px 2px;}
.nav-btn{position:relative;}

/* ── SECTION LABELS ─────────────────────────────────────────── */
.section-lbl{font-size:9px;font-weight:700;letter-spacing:2.5px;color:var(--muted);-webkit-text-fill-color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}

/* ── FILTER CHIPS ─────────────────────────────────────────── */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding:0 16px 14px;margin:0;}
.filter-chip{background:var(--card);border:1.5px solid var(--border2);border-radius:3px;padding:7px 14px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted2);-webkit-text-fill-color:var(--muted2);white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0;text-transform:uppercase;}
.filter-chip.active{background:var(--f1-red);border-color:var(--f1-red);color:#fff!important;-webkit-text-fill-color:#fff!important;}

/* ── MONTH DIVIDER ─────────────────────────────────────────── */
.month-divider{display:flex;align-items:center;gap:10px;padding:16px 16px 10px;margin-top:4px;}
.month-divider:first-child{padding-top:4px;}
.month-divider span{font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--f1-red);-webkit-text-fill-color:var(--f1-red);text-transform:uppercase;white-space:nowrap;}
.month-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── RACE CARD ─────────────────────────────────────────── */
.race-card{background:var(--card);border:1px solid var(--border);margin:0 16px 8px;border-radius:8px;overflow:hidden;transition:border-color .15s;}
.race-card.past{opacity:.5;}
.race-card.next-up{border-color:rgba(225,6,0,.4);background:linear-gradient(135deg,#130003 0%,#111 100%);}
.race-card.cancelled{opacity:.35;}

/* Red left accent for next race */
.race-card.next-up .rc-accent{display:block;}
.rc-accent{display:none;position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--f1-red);}
.rc-header{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;position:relative;}
.rc-round{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--muted);-webkit-text-fill-color:var(--muted);min-width:22px;text-align:center;}
.rc-flag{font-size:20px;flex-shrink:0;}
.rc-info{flex:1;min-width:0;}
.rc-name{font-family:'Titillium Web',sans-serif;font-weight:700;font-size:15px;color:#fff;-webkit-text-fill-color:#fff;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-circuit{font-size:10px;color:var(--muted);-webkit-text-fill-color:var(--muted);font-weight:400;margin-top:2px;}
.rc-right{text-align:right;flex-shrink:0;}
.rc-dates{font-size:10px;font-weight:700;color:var(--muted2);-webkit-text-fill-color:var(--muted2);white-space:nowrap;}
.rc-winner{font-size:10px;color:var(--f1-red);-webkit-text-fill-color:var(--f1-red);font-weight:700;margin-top:2px;text-align:right;}
.rc-next-tag{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--f1-red);-webkit-text-fill-color:var(--f1-red);margin-top:2px;}

/* Race card expanded body */
.rc-body{border-top:1px solid var(--border);padding:12px 14px;}
.sess-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.sess-row:last-child{border-bottom:none;}
.sr-left{display:flex;align-items:center;gap:8px;}
.sr-pip{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sr-pip.race{background:var(--f1-red);}
.sr-pip.quali{background:#4a9eff;}
.sr-pip.sprint{background:#ff8000;}
.sr-pip.sprint-q{background:#ffaa00;}
.sr-pip.fp{background:#333;}
.sr-name{font-size:12px;font-weight:600;color:#ccc;-webkit-text-fill-color:#ccc;}
.sr-right{text-align:right;}
.sr-time{font-size:11px;color:var(--muted2);-webkit-text-fill-color:var(--muted2);}
.sr-day{font-size:10px;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-top:1px;}

/* Podium */
.podium-row{display:flex;gap:6px;margin-top:12px;}
.podium-item{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:7px;padding:10px 6px;text-align:center;}
.pd-pos{font-family:'Titillium Web',sans-serif;font-weight:700;font-size:17px;margin-bottom:4px;}
.pd-pos.p1{color:#ffd700;-webkit-text-fill-color:#ffd700;}
.pd-pos.p2{color:#aaa;-webkit-text-fill-color:#aaa;}
.pd-pos.p3{color:#cd7f32;-webkit-text-fill-color:#cd7f32;}
.pd-name{font-size:11px;font-weight:700;color:#fff;-webkit-text-fill-color:#fff;}
.pd-team{font-size:9px;color:var(--muted);-webkit-text-fill-color:var(--muted);}

/* ── STANDINGS ─────────────────────────────────────────── */
.toggle-row{display:flex;gap:0;margin:0 16px 16px;border:1px solid var(--border2);border-radius:6px;overflow:hidden;}
.toggle-btn{flex:1;background:none;border:none;padding:10px;font-size:11px;font-weight:700;letter-spacing:1.5px;cursor:pointer;color:var(--muted);-webkit-text-fill-color:var(--muted);transition:all .15s;text-transform:uppercase;}
.toggle-btn.active{background:var(--f1-red);color:#fff!important;-webkit-text-fill-color:#fff!important;}

.driver-card{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);
  margin:0 16px 7px;border-radius:8px;padding:12px 14px;
  animation:fadeUp .2s ease both;
}
.dc-pos{font-family:'Titillium Web',sans-serif;font-weight:700;font-size:18px;color:#2a2a2a;-webkit-text-fill-color:#2a2a2a;min-width:24px;text-align:center;}
.dc-pos.top{color:#fff;-webkit-text-fill-color:#fff;}
.dc-bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;}
.dc-info{flex:1;min-width:0;}
.dc-name{font-family:'Titillium Web',sans-serif;font-weight:700;font-size:14px;color:#fff;-webkit-text-fill-color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dc-team{font-size:10px;color:var(--muted);-webkit-text-fill-color:var(--muted);font-weight:400;margin-top:1px;}
.dc-flag{font-size:13px;margin-right:3px;}
/* pts bar */
.dc-pts-bar{height:2px;border-radius:1px;margin-top:6px;transform-origin:left;animation:slideRight .5s ease both;}
.dc-pts{text-align:right;}
.dc-pts-num{font-family:'Titillium Web',sans-serif;font-weight:700;font-size:20px;color:#fff;-webkit-text-fill-color:#fff;}
.dc-pts-lbl{font-size:8px;font-weight:700;letter-spacing:1.5px;color:var(--muted);-webkit-text-fill-color:var(--muted);text-transform:uppercase;}
.dc-gap{font-size:10px;color:#444;-webkit-text-fill-color:#444;font-weight:600;}

/* standings info banner */
.standings-banner{
  margin:0 16px 14px;
  background:var(--f1-red-dim);
  border:1px solid rgba(225,6,0,.2);
  border-radius:8px;padding:12px 14px;
}
.sb-label{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--f1-red);-webkit-text-fill-color:var(--f1-red);text-transform:uppercase;margin-bottom:3px;}
.sb-title{font-family:'Titillium Web',sans-serif;font-weight:700;font-size:15px;color:#fff;-webkit-text-fill-color:#fff;}
.sb-sub{font-size:11px;color:var(--muted2);-webkit-text-fill-color:var(--muted2);margin-top:2px;}

/* ── NEWS ─────────────────────────────────────────── */
.news-hero{
  margin:0 16px 12px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;overflow:hidden;cursor:pointer;
  position:relative;
}
.news-hero-image{
  width:100%;height:160px;
  background:linear-gradient(135deg,#1a0005 0%,#0d0d1a 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:48px;position:relative;overflow:hidden;
}
.news-hero-image::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:80px;
  background:linear-gradient(transparent,var(--card));
  pointer-events:none;
}
.news-hero-overlay{position:absolute;bottom:0;left:0;right:0;padding:14px;}
.nho-tag{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--f1-red);-webkit-text-fill-color:var(--f1-red);text-transform:uppercase;margin-bottom:5px;}
.nho-title{font-family:'Titillium Web',sans-serif;font-weight:700;font-size:16px;color:#fff;-webkit-text-fill-color:#fff;line-height:1.3;}

.news-card{
  display:flex;align-items:flex-start;gap:12px;
  background:var(--card);border:1px solid var(--border);
  margin:0 16px 7px;border-radius:8px;padding:13px 14px;
  cursor:pointer;transition:border-color .15s;
  animation:fadeUp .2s ease both;
}
.news-card:active{border-color:var(--border2);}
.nc-tag{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--f1-red);-webkit-text-fill-color:var(--f1-red);text-transform:uppercase;margin-bottom:4px;}
.nc-title{font-size:13px;font-weight:700;color:#fff;-webkit-text-fill-color:#fff;line-height:1.4;}
.nc-meta{font-size:10px;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-top:5px;font-weight:400;}
.nc-icon{width:52px;height:52px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;}

.breaking-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--f1-red);border-radius:3px;
  padding:2px 8px;
  font-size:8px;font-weight:700;letter-spacing:2px;
  color:#fff;-webkit-text-fill-color:#fff;
  text-transform:uppercase;margin-bottom:6px;
}
.breaking-dot{width:4px;height:4px;border-radius:50%;background:#fff;animation:blink 1s ease-in-out infinite;}

/* ── TEAMS ─────────────────────────────────────────── */
.team-card{
  background:var(--card);border:1px solid var(--border);
  margin:0 16px 8px;border-radius:8px;overflow:hidden;
}
.tc-header{display:flex;align-items:center;gap:12px;padding:14px;}
.tc-color-bar{width:4px;height:52px;border-radius:2px;flex-shrink:0;}
.tc-info{flex:1;}
.tc-name{font-family:'Titillium Web',sans-serif;font-weight:700;font-size:17px;color:#fff;-webkit-text-fill-color:#fff;}
.tc-drivers{font-size:11px;color:var(--muted2);-webkit-text-fill-color:var(--muted2);margin-top:2px;font-weight:400;}
.tc-base{font-size:10px;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-top:1px;}
.tc-pts-box{text-align:right;}
.tc-pts{font-family:'Titillium Web',sans-serif;font-weight:700;font-size:22px;color:#fff;-webkit-text-fill-color:#fff;}

// ── MONTRÉAL TIME HELPERS ─────────────────────────────────────
function sessionMTL(timeStr, dayStr) {
  if (!timeStr || !timeStr.includes('GMT')) return null;
  const gmtPart = timeStr.split('/').find(p => p.includes('GMT'));
  if (!gmtPart) return null;
  const match = gmtPart.trim().match(/(\d{1,2}):(\d{2})/);
  if (!match) return null;
  const utcH = parseInt(match[1]), utcM = parseInt(match[2]);
  const months = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  let month = 3;
  if (dayStr) { for (const [k,v] of Object.entries(months)) { if (dayStr.includes(k)) { month=v; break; } } }
  // EDT = UTC-4 (Mar–Nov), EST = UTC-5 (Dec–Feb)
  const isEDT = month >= 3 && month <= 11;
  const off = isEDT ? -4 : -5;
  let h = utcH + off; if (h < 0) h += 24; if (h >= 24) h -= 24;
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 === 0 ? 12 : h % 12;
  const mm = String(utcM).padStart(2,'0');
  return `${h12}:${mm}\u202F${ampm} ${isEDT?'EDT':'EST'}`;
}

const TODAY_MS = new Date('2026-03-15T12:00:00').getTime();

function getNextRace() {
  return CALENDAR.find(r => !r.past && !r.cancelled);
}

function getCountdownTo(dateStr) {
  const target = new Date(dateStr + 'T14:00:00').getTime();
  const diff = target - TODAY_MS;
  if (diff <= 0) return { d:0,h:0,m:0,s:0 };
  const d = Math.floor(diff/86400000);
  const h = Math.floor((diff%86400000)/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);
  return {d,h,m,s};
}

function pad(n){ return String(n).padStart(2,'0'); }

function formatDateRange(s,e){
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const sd=new Date(s), ed=new Date(e);
  if(sd.getMonth()===ed.getMonth()) return `${sd.getDate()}–${ed.getDate()} ${months[sd.getMonth()]}`;
  return `${sd.getDate()} ${months[sd.getMonth()]} – ${ed.getDate()} ${months[ed.getMonth()]}`;
}

  const sessHTML = keySessions.map(sess=>{
    const mtl = sessionMTL(sess.time, sess.day);
    return `<div class="nrw-sess ${sess.pip==='race'?'race-sess':sess.pip==='sprint'?'sprint-sess':''}">
      <div class="ns-type">${sess.name}</div>
      <div class="ns-date">${sess.day.split(' ').slice(0,2).join(' ')}</div>
      ${mtl?`<div class="ns-time" style="color:#fff;-webkit-text-fill-color:#fff;font-weight:700">${mtl}</div>`:``}
      <div class="ns-time" style="opacity:.6">${sess.time.split('/')[0].trim()}</div>
    </div>`;
  }).join('');

  document.getElementById('nrw-wrap').innerHTML = `
    <div class="nrw">
      <div class="nrw-accent"></div>
      <div class="nrw-label">Next Race Weekend</div>
      <div class="nrw-top">
        <div>
          <div class="nrw-name">
            Round ${r.round} · ${r.gp}
            ${r.sprint?'<span class="badge-sprint">SPRINT</span>':''}
          </div>
          <div class="nrw-circuit">${r.circuit} · ${r.dateStr}</div>
        </div>
        <div class="nrw-flag">${r.flag}</div>
      </div>
      <div class="nrw-cd">
        <div class="cd-block"><div class="cd-num" id="cd-d">${pad(d)}</div><div class="cd-unit">Days</div></div>
        <div class="cd-sep">:</div>
        <div class="cd-block"><div class="cd-num" id="cd-h">${pad(h)}</div><div class="cd-unit">Hrs</div></div>
        <div class="cd-sep">:</div>
        <div class="cd-block"><div class="cd-num" id="cd-m">${pad(m)}</div><div class="cd-unit">Min</div></div>
        <div class="cd-sep">:</div>
        <div class="cd-block"><div class="cd-num" id="cd-s">${pad(s)}</div><div class="cd-unit">Sec</div></div>
      </div>
      <div class="nrw-sessions">${sessHTML}</div>
    </div>`;
}

function startCountdown() {
  const r = getNextRace();
  if (!r) return;
  const target = new Date(r.dates.start + 'T14:00:00');
  setInterval(()=>{
    const now = new Date();
    const diff = target - now;
    if (diff <= 0) return;
    const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),
          m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    const cd=document.getElementById('cd-d'),ch=document.getElementById('cd-h'),
          cm=document.getElementById('cd-m'),cs=document.getElementById('cd-s');
    if(cd)cd.textContent=pad(d);if(ch)ch.textContent=pad(h);
    if(cm)cm.textContent=pad(m);if(cs)cs.textContent=pad(s);
  },1000);
}

function goto(t) {
  tab = t;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb = document.getElementById('nav-'+t);
  if(nb) nb.classList.add('active');
  render();
}

function render() {
  const c = document.getElementById('content');
  const map = {news:renderNews, calendar:renderCalendar, standings:renderStandings, results:renderResults, teams:renderTeams, widgets:renderWidgets};
  c.innerHTML = (map[tab]||renderNews)();
  c.classList.remove('fade');
  void c.offsetWidth;
  c.classList.add('fade');
}

function renderCalendar() {
  const filters=[
    {id:'all',label:'All'},
    {id:'upcoming',label:'Upcoming'},
    {id:'past',label:'Past'},
    {id:'sprint',label:'Sprint'},
    {id:'cancelled',label:'Cancelled'},
  ];
  const filterHTML=`<div class="filter-row">${filters.map(f=>
    `<button class="filter-chip ${calFilter===f.id?'active':''}" onclick="setCalFilter('${f.id}')">${f.label}</button>`
  ).join('')}</div>`;

  let races=CALENDAR;
  if(calFilter==='upcoming') races=races.filter(r=>!r.past&&!r.cancelled);
  if(calFilter==='past') races=races.filter(r=>r.past);
  if(calFilter==='sprint') races=races.filter(r=>r.sprint);
  if(calFilter==='cancelled') races=races.filter(r=>r.cancelled);

  const nextRound = getNextRace()?.round;
  let lastMonth='';

  const racesHTML = races.map(r=>{
    let monthDiv='';
    if(r.month!==lastMonth){
      monthDiv=`<div class="month-divider"><span>${r.month}</span></div>`;
      lastMonth=r.month;
    }
    const isNext=r.round===nextRound;
    const isExp=expandedRound===r.round;

    let bodyHTML='';
    if(isExp){
      if(r.cancelled){
        bodyHTML=`<div class="rc-body">
          <div style="font-size:12px;color:#666;-webkit-text-fill-color:#666;font-style:italic">${r.cancelNote}</div>
        </div>`;
      } else {
        const sessRows=r.sessions.map(s=>{
          const mtl=sessionMTL(s.time,s.day);
          return `<div class="sess-row">
            <div class="sr-left">
              <div class="sr-pip ${s.pip}"></div>
              <div class="sr-name">${s.name}</div>
            </div>
            <div class="sr-right" style="text-align:right">
              ${mtl?`<div style="font-size:12px;font-weight:700;color:#fff;-webkit-text-fill-color:#fff;">${mtl} <span style="font-size:9px;font-weight:700;color:var(--f1-red);-webkit-text-fill-color:var(--f1-red);letter-spacing:1px;">MTL</span></div>`:''}
              <div class="sr-time" style="margin-top:1px">${s.time}</div>
              <div class="sr-day">${s.day}</div>
            </div>
          </div>`;
        }).join('');
        const podHTML=r.past&&r.podium?`
          <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
            <div class="section-lbl" style="margin-bottom:6px">Podium</div>
            <div class="podium-row">
              ${r.podium.map(p=>`<div class="podium-item">
                <div class="pd-pos ${p.pos===1?'p1':p.pos===2?'p2':'p3'}">${p.pos===1?'🥇':p.pos===2?'🥈':'🥉'}</div>
                <div class="pd-name">${p.driver}</div>
                <div class="pd-team">${p.team}</div>
              </div>`).join('')}
            </div>
          </div>`:''
        bodyHTML=`<div class="rc-body">${sessRows}${podHTML}</div>`;
      }
    }

    return `${monthDiv}
    <div class="race-card ${r.past?'past':''} ${isNext?'next-up':''} ${r.cancelled?'cancelled':''}">
      <div class="rc-header" onclick="toggleRound(${r.round})">
        <div class="rc-accent"></div>
        <div class="rc-round">R${r.round}</div>
        <div class="rc-flag">${r.flag}</div>
        <div class="rc-info">
          <div class="rc-name">
            ${r.gp}
            ${r.sprint?'<span class="badge-sprint">SPRINT</span>':''}
            ${r.cancelled?'<span class="badge-cancelled">CANCELLED</span>':''}
          </div>
          <div class="rc-circuit">${r.circuit}</div>
        </div>
        <div class="rc-right">
          <div class="rc-dates">${r.dateStr}</div>
          ${r.past&&r.winner?`<div class="rc-winner">🏆 ${r.winner}</div>`:''}
          ${isNext?`<div class="rc-next-tag">NEXT ▶</div>`:''}
        </div>
      </div>
      ${bodyHTML}
    </div>`;
  }).join('');

  return filterHTML+racesHTML;
}

function setCalFilter(f){calFilter=f;render();}
function toggleRound(r){expandedRound=expandedRound===r?null:r;render();}

function renderStandings() {
  const toggle=`<div class="toggle-row">
    <button class="toggle-btn ${standingsView==='drivers'?'active':''}" onclick="setStandView('drivers')">Drivers</button>
    <button class="toggle-btn ${standingsView==='constructors'?'active':''}" onclick="setStandView('constructors')">Constructors</button>
  </div>`;

  const lr = window._lastRace;
  const roundNum = lr?.round || 2;
  const gpName   = lr?.gpName || 'Chinese Grand Prix';
  const winner   = lr?.winner || 'Antonelli';
  const leader   = DRIVER_STANDINGS[0];
  const remaining = Math.max(0, 24 - roundNum);

  const banner=`<div class="standings-banner">
    <div class="sb-label">After Round ${roundNum} · ${gpName}</div>
    <div class="sb-title">${leader ? `${leader.name} leads — ${leader.pts} pts` : `${winner} wins`}</div>
    <div class="sb-sub">${remaining} rounds remaining · Last winner: ${winner}</div>
  </div>`;

  if(standingsView==='drivers'){
    const max=DRIVER_STANDINGS[0].pts;
    const rows=DRIVER_STANDINGS.map((d,i)=>{
      const color=TEAM_COLORS[d.team]||'#555';
      const barW=max>0?Math.round((d.pts/max)*100):0;
      const gap=i>0&&d.pts>0?`−${DRIVER_STANDINGS[0].pts-d.pts}`:i>0?'—':'LEADER';
      return `<div class="driver-card" style="animation-delay:${i*0.03}s">
        <div class="dc-pos ${d.pos<=3?'top':''}">${d.pos}</div>
        <div class="dc-bar" style="background:${color}"></div>
        <div class="dc-info">
          <div class="dc-name"><span class="dc-flag">${d.flag}</span>${d.name}</div>
          <div class="dc-team">${d.team}</div>
          <div class="dc-pts-bar" style="width:${barW}%;background:${color};animation-delay:${i*0.05}s"></div>
        </div>
        <div class="dc-pts">
          <div class="dc-pts-num">${d.pts}</div>
          <div class="dc-pts-lbl">PTS</div>
          <div class="dc-gap">${gap}</div>
        </div>
      </div>`;
    }).join('');
    return toggle+banner+rows;
  } else {
    const max=CONSTRUCTOR_STANDINGS[0].pts;
    const rows=CONSTRUCTOR_STANDINGS.map((t,i)=>{
      const color=TEAM_COLORS[t.name]||'#555';
      const barW=max>0?Math.round((t.pts/max)*100):0;
      const gap=i>0&&t.pts>0?`−${CONSTRUCTOR_STANDINGS[0].pts-t.pts}`:i>0?'—':'LEADER';
      return `<div class="driver-card" style="animation-delay:${i*0.03}s">
        <div class="dc-pos ${t.pos<=3?'top':''}">${t.pos}</div>
        <div class="dc-bar" style="background:${color}"></div>
        <div class="dc-info">
          <div class="dc-name">${t.name}</div>
          <div class="dc-team" style="font-size:10px;color:var(--muted)">${t.drivers}</div>
          <div class="dc-pts-bar" style="width:${barW}%;background:${color};animation-delay:${i*0.05}s"></div>
        </div>
        <div class="dc-pts">
          <div class="dc-pts-num">${t.pts}</div>
          <div class="dc-pts-lbl">PTS</div>
          <div class="dc-gap">${gap}</div>
        </div>
      </div>`;
    }).join('');
    return toggle+banner+rows;
  }
}
function setStandView(v){standingsView=v;render();}

function renderResults() {
  const past = CALENDAR.filter(r => r.past).reverse();
  if (!past.length) return `<div style="text-align:center;padding:60px 16px;color:var(--muted);">
    <div style="font-size:48px;margin-bottom:12px">🏁</div>

    <div style="font-size:12px;">Results will appear here after each race.</div>
  </div>`;

  return past.map(r => {
    const key = 'res_' + r.round;
    const isExp = expandedRound === key;
    const maxPts = r.raceStandings ? r.raceStandings[0].pts : 1;

    let body = '';
    if (isExp) {
      // ── Podium ──
      const podHTML = r.podium ? `
        <div style="margin-bottom:14px;">
          <div class="section-lbl" style="margin-bottom:8px">Race Podium</div>
          <div class="podium-row">
            ${r.podium.map(p=>`<div class="podium-item">
              <div class="pd-pos ${p.pos===1?'p1':p.pos===2?'p2':'p3'}">${p.pos===1?'🥇':p.pos===2?'🥈':'🥉'}</div>
              <div class="pd-name">${p.driver}</div>
              <div class="pd-team">${p.team}</div>
            </div>`).join('')}
          </div>
        </div>` : '';

      // ── Full driver standings after this race ──
      const standHTML = r.raceStandings ? `
        <div style="margin-top:4px;padding-top:12px;border-top:1px solid var(--border);">
          <div class="section-lbl" style="margin-bottom:8px">Championship Standings — After ${r.gp}</div>
          ${r.raceStandings.map((d, i) => {
            const color = TEAM_COLORS[d.team] || '#555';
            const barW = maxPts > 0 ? Math.round((d.pts / maxPts) * 100) : 0;
            const isPoints = d.pts > 0;
            return `<div style="
              display:flex;align-items:center;gap:9px;
              padding:7px 0;
              border-bottom:1px solid rgba(255,255,255,.03);
              opacity:${isPoints?1:0.45};
            ">
              <div style="
                font-family:'Titillium Web',sans-serif;font-weight:700;font-size:13px;
                color:${i < 3 ? '#fff' : '#333'};-webkit-text-fill-color:${i < 3 ? '#fff' : '#333'};
                min-width:22px;text-align:center;
              ">${d.pos}</div>
              <div style="width:3px;height:28px;background:${color};border-radius:2px;flex-shrink:0;"></div>
              <div style="flex:1;min-width:0;">
                <div style="
                  font-family:'Titillium Web',sans-serif;font-weight:700;font-size:13px;
                  color:#fff;-webkit-text-fill-color:#fff;
                  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
                ">${d.flag} ${d.driver}</div>
                <div style="font-size:10px;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-top:1px;">${d.team}</div>
                <div style="height:2px;background:${color};border-radius:1px;width:${barW}%;margin-top:4px;"></div>
              </div>
              <div style="text-align:right;flex-shrink:0;">
                <div style="
                  font-family:'Titillium Web',sans-serif;font-weight:700;font-size:16px;
                  color:${isPoints?'#fff':'#333'};-webkit-text-fill-color:${isPoints?'#fff':'#333'};
                ">${d.pts}</div>
                <div style="font-size:8px;font-weight:700;letter-spacing:1px;color:var(--muted);-webkit-text-fill-color:var(--muted);">PTS</div>
              </div>
            </div>`;
          }).join('')}
        </div>` : '';

      body = `<div class="rc-body">${podHTML}${standHTML}</div>`;
    }

    return `<div class="race-card" onclick="toggleRound('${key}')">
      <div class="rc-header">
        <div class="rc-round">R${r.round}</div>
        <div class="rc-flag">${r.flag}</div>
        <div class="rc-info">
          <div class="rc-name">${r.gp}${r.sprint?` <span class="badge-sprint">SPRINT</span>`:''}</div>
          <div class="rc-circuit">${r.dateStr} · ${r.circuit}</div>
        </div>
        <div class="rc-right">
          ${r.winner ? `<div style="background:var(--f1-red-dim);border:1px solid rgba(225,6,0,.25);border-radius:4px;padding:4px 8px;font-size:10px;font-weight:700;color:var(--f1-red);-webkit-text-fill-color:var(--f1-red);">🏆 ${r.winner}</div>` : ''}
          <div style="font-size:9px;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-top:4px;text-align:right;">${isExp ? '▲ Close' : '▼ Standings'}</div>
        </div>
      </div>
      ${body}
    </div>`;
  }).join('');
}

function togglePref(key, val) {
  PREFS[key] = val;
  savePrefs(PREFS);
  render();
}

function toggleFavDriver(short) {
  const idx = PREFS.favDrivers.indexOf(short);
  if (idx > -1) {
    PREFS.favDrivers.splice(idx, 1);
  } else if (PREFS.favDrivers.length < 3) {
    PREFS.favDrivers.push(short);
  }
  savePrefs(PREFS);
  render();
}

function setWidgetSize(size) {
  PREFS.widgetSize = size;
  savePrefs(PREFS);
  render();
}

// ══════════════════════════════════════════════════════════════
//  LIVE DATA — OpenF1 + Ergast APIs
//  Runs on every app open. Hardcoded data shows instantly,
//  then live data silently replaces it when the fetch returns.
// ══════════════════════════════════════════════════════════════

const CACHE_TTL_MS = 10 * 60 * 1000; // 10 minutes
let _lastFetch = 0;
let _fetchPromise = null;

// ── Mark which races are past based on today's real date ─────
function markPastRaces() {
  const now = new Date();
  CALENDAR.forEach(r => {
    if (r.cancelled) return;
    const raceEnd = new Date(r.dates.end + 'T23:59:00Z');
    r.past = raceEnd < now;
  });
}

// ── Fetch driver standings — Ergast gives real points ────────
async function fetchDriverStandings() {
  const res = await fetch(
    'https://ergast.com/api/f1/current/driverStandings.json',
    { signal: AbortSignal.timeout(8000) }
  );
  if (!res.ok) throw new Error('standings failed');
  const json = await res.json();
  const list = json?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings;
  if (!list?.length) throw new Error('empty standings');

  const teamMap = {
    'mercedes':'Mercedes','ferrari':'Ferrari','mclaren':'McLaren',
    'red_bull':'Red Bull','alpine':'Alpine','williams':'Williams',
    'haas':'Haas','kick_sauber':'Audi','rb':'Racing Bulls',
    'aston_martin':'Aston Martin','cadillac':'Cadillac',
  };
  const flagMap = {
    'British':'🇬🇧','Italian':'🇮🇹','Monégasque':'🇲🇨','Spanish':'🇪🇸',
    'Dutch':'🇳🇱','Finnish':'🇫🇮','Mexican':'🇲🇽','Australian':'🇦🇺',
    'French':'🇫🇷','German':'🇩🇪','Thai':'🇹🇭','Canadian':'🇨🇦',
    'Brazilian':'🇧🇷','Argentine':'🇦🇷','New Zealander':'🇳🇿','Swedish':'🇸🇪',
    'American':'🇺🇸',
  };

  return list.map(s => ({
    pos:   parseInt(s.position),
    name:  `${s.Driver.givenName} ${s.Driver.familyName}`,
    short: s.Driver.code || s.Driver.familyName.slice(0,3).toUpperCase(),
    team:  teamMap[s.Constructors?.[0]?.constructorId] || s.Constructors?.[0]?.name || 'Unknown',
    flag:  flagMap[s.Driver.nationality] || '🏁',
    pts:   parseFloat(s.points),
    wins:  parseInt(s.wins),
  }));
}

// ── Fetch constructor standings ───────────────────────────────
async function fetchConstructorStandings() {
  const res = await fetch(
    'https://ergast.com/api/f1/current/constructorStandings.json',
    { signal: AbortSignal.timeout(8000) }
  );
  if (!res.ok) throw new Error('constructor standings failed');
  const json = await res.json();
  const list = json?.MRData?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings;
  if (!list?.length) throw new Error('empty constructor standings');

  const nameMap = {
    'mercedes':'Mercedes','ferrari':'Ferrari','mclaren':'McLaren',
    'red_bull':'Red Bull','alpine':'Alpine','williams':'Williams',
    'haas':'Haas','kick_sauber':'Audi','rb':'Racing Bulls',
    'aston_martin':'Aston Martin','cadillac':'Cadillac',
  };

  return list.map(s => ({
    pos:     parseInt(s.position),
    name:    nameMap[s.Constructor.constructorId] || s.Constructor.name,
    pts:     parseFloat(s.points),
    wins:    parseInt(s.wins),
    drivers: '',
  }));
}

// ── Fetch last race result ────────────────────────────────────
async function fetchLastResult() {
  const res = await fetch(
    'https://ergast.com/api/f1/current/last/results.json',
    { signal: AbortSignal.timeout(8000) }
  );
  if (!res.ok) throw new Error('last result failed');
  const json = await res.json();
  const race = json?.MRData?.RaceTable?.Races?.[0];
  if (!race) throw new Error('no race');

  return {
    gpName:     race.raceName,
    round:      parseInt(race.round),
    winner:     race.Results?.[0]?.Driver?.familyName || '',
    winnerTeam: race.Results?.[0]?.Constructor?.name  || '',
    podium: (race.Results || []).slice(0,3).map(r => ({
      pos:    parseInt(r.position),
      driver: r.Driver.familyName,
      team:   r.Constructor.name,
    })),
  };
}

// ── Fetch all race results and update calendar ────────────────
async function updateCalendarResults() {
  const res = await fetch(
    'https://ergast.com/api/f1/current/results.json?limit=100',
    { signal: AbortSignal.timeout(8000) }
  );
  if (!res.ok) return;
  const json = await res.json();
  const races = json?.MRData?.RaceTable?.Races || [];

  for (const er of races) {
    const cal = CALENDAR.find(r => r.round === parseInt(er.round));
    if (!cal) continue;
    cal.past       = true;
    cal.winner     = er.Results?.[0]?.Driver?.familyName     || cal.winner || '';
    cal.winnerTeam = er.Results?.[0]?.Constructor?.name      || cal.winnerTeam || '';
    cal.podium = (er.Results || []).slice(0,3).map(r => ({
      pos:    parseInt(r.position),
      driver: r.Driver.familyName,
      team:   r.Constructor.name,
    }));
  }
}

// ── Check if a session is live right now ─────────────────────
async function checkLiveSession() {
  const res = await fetch(
    'https://api.openf1.org/v1/sessions?year=2026',
    { signal: AbortSignal.timeout(5000) }
  );
  if (!res.ok) return null;
  const sessions = await res.json();
  const now = Date.now();
  for (const s of sessions) {
    const start = new Date(s.date_start).getTime();
    const end   = new Date(s.date_end || s.date_start).getTime() + 3 * 3600000;
    if (now >= start && now <= end) return s;
  }
  return null;
}

// ── Main fetch orchestrator ───────────────────────────────────
async function fetchLiveData() {
  if (_fetchPromise) return _fetchPromise;
  if (Date.now() - _lastFetch < CACHE_TTL_MS) return;

  _fetchPromise = (async () => {
    // Show tiny spinner in header
    const pill = document.getElementById('round-pill');
    if (pill) { pill._orig = pill.textContent; pill.textContent = 'updating…'; }

    try {
      // Always mark past races from real date first
      markPastRaces();

      // Fire all fetches in parallel
      const [drivers, constructors, lastResult, liveSession] = await Promise.allSettled([
        fetchDriverStandings(),
        fetchConstructorStandings(),
        fetchLastResult(),
        checkLiveSession(),
      ]);

      // Apply driver standings
      if (drivers.status === 'fulfilled' && drivers.value?.length) {
        DRIVER_STANDINGS.length = 0;
        drivers.value.forEach(d => DRIVER_STANDINGS.push(d));
      }

      // Apply constructor standings + fill driver names
      if (constructors.status === 'fulfilled' && constructors.value?.length) {
        const drvData = drivers.status === 'fulfilled' ? drivers.value : [];
        constructors.value.forEach(c => {
          const drvs = drvData.filter(d => d.team === c.name).map(d => d.short);
          c.drivers = drvs.join(' / ') || c.drivers;
        });
        CONSTRUCTOR_STANDINGS.length = 0;
        constructors.value.forEach(c => CONSTRUCTOR_STANDINGS.push(c));
      }

      // Update calendar with real results
      await updateCalendarResults().catch(() => {});

      // Store last result info for standings banner
      if (lastResult.status === 'fulfilled') {
        window._lastRace = lastResult.value;
      }

      // Handle live session
      const live = liveSession.status === 'fulfilled' ? liveSession.value : null;
      const livePill  = document.getElementById('live-pill');
      if (live && livePill) {
        livePill.style.display = 'flex';
        if (pill) pill.style.display = 'none';
        _lastFetch = 0; // re-fetch next time immediately (session is live)
      } else {
        _lastFetch = Date.now();
      }

      // Re-render with fresh data
      render();
      buildWidget();

    } catch(e) {
      console.log('Fetch error (using cached data):', e.message);
    } finally {
      // Restore header pill
      if (pill && pill._orig) pill.textContent = pill._orig;
      _fetchPromise = null;
    }
  })();

  return _fetchPromise;
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════

// 1. Mark past races immediately from today's real date
markPastRaces();

// 2. Render instantly with hardcoded data as fallback
buildWidget();
startCountdown();
render();

// 3. Fetch live data in background — re-renders when ready
fetchLiveData();

// 4. Re-fetch every time you open the app from background
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    _lastFetch = 0;
    fetchLiveData();
  }
});

// ── SERVICE WORKER (PWA) ─────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}</script>
